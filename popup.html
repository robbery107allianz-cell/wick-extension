<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font: 13px -apple-system, sans-serif; width: 280px; padding: 12px; }
  #url { font-size: 11px; color: #888; word-break: break-all; margin-bottom: 4px; }
  button { width: 100%; padding: 8px; margin-top: 8px; cursor: pointer; }
  textarea { width: 100%; box-sizing: border-box; margin-top: 8px; font: inherit; }
  #status { margin-top: 8px; font-size: 12px; color: #666; white-space: pre-wrap; }
  a.opts { display: block; margin-top: 10px; font-size: 11px; text-align: right; }
</style>
</head>
<body>
  <div id="url"></div>
  <textarea id="note" rows="2" placeholder="备注（可选）"></textarea>
  <button id="capture">索引这一刻</button>
  <div id="status"></div>
  <a class="opts" id="openOptions" href="#">设置</a>
  <script src="popup.js"></script>
</body>
</html>
